name: agentcore

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    profiles: ["core", "all"]
    environment:
      POSTGRES_DB: ${AGENTCORE_POSTGRES_DATABASE:-agentcore}
      POSTGRES_USER: ${AGENTCORE_POSTGRES_USER:-agentcore}
      POSTGRES_PASSWORD: ${AGENTCORE_POSTGRES_PASSWORD:?AGENTCORE_POSTGRES_PASSWORD is required}
    ports:
      - "${AGENTCORE_POSTGRES_PORT:-32232}:5432"
    volumes:
      - agentcore-postgres-data:/var/lib/postgresql
      - ../../platform/persistence/postgres/0000_extensions.sql:/docker-entrypoint-initdb.d/0000_extensions.sql:ro
      - ../../services/core-data-service/migrations/0001_core_data.sql:/docker-entrypoint-initdb.d/0010_core_data.sql:ro
      - ../../services/core-data-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0011_core_data_outbox.sql:ro
      - ../../services/memory-service/migrations/0001_memory.sql:/docker-entrypoint-initdb.d/0020_memory.sql:ro
      - ../../services/memory-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0021_memory_outbox.sql:ro
      - ../../services/docs-sync-service/migrations/0001_docs_sync.sql:/docker-entrypoint-initdb.d/0030_docs_sync.sql:ro
      - ../../services/docs-sync-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0031_docs_sync_outbox.sql:ro
      - ../../services/code-graph-service/migrations/0001_code_graph.sql:/docker-entrypoint-initdb.d/0040_code_graph.sql:ro
      - ../../services/code-graph-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0041_code_graph_outbox.sql:ro
      - ../../services/code-graph-service/migrations/0003_symbol_embeddings.sql:/docker-entrypoint-initdb.d/0042_code_graph_embeddings.sql:ro
      - ../../services/rule-engine-service/migrations/0001_rule_engine.sql:/docker-entrypoint-initdb.d/0050_rule_engine.sql:ro
      - ../../services/rule-engine-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0051_rule_engine_outbox.sql:ro
      - ../../services/adapter-service/migrations/0001_adapter.sql:/docker-entrypoint-initdb.d/0060_adapter.sql:ro
      - ../../services/adapter-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0061_adapter_outbox.sql:ro
      - ../../services/audit-service/migrations/0001_audit.sql:/docker-entrypoint-initdb.d/0070_audit.sql:ro
      - ../../services/audit-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0071_audit_outbox.sql:ro
      - ../../services/identity-access-service/migrations/0001_identity_access.sql:/docker-entrypoint-initdb.d/0080_identity_access.sql:ro
      - ../../services/identity-access-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0081_identity_access_outbox.sql:ro
      - ../../services/orchestration-service/migrations/0001_orchestration.sql:/docker-entrypoint-initdb.d/0090_orchestration.sql:ro
      - ../../services/orchestration-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0091_orchestration_outbox.sql:ro
      - ../../services/reporting-service/migrations/0001_reporting.sql:/docker-entrypoint-initdb.d/0100_reporting.sql:ro
      - ../../services/reporting-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0101_reporting_outbox.sql:ro
      - ../../services/project-profile-service/migrations/0001_project_profile.sql:/docker-entrypoint-initdb.d/0110_project_profile.sql:ro
      - ../../services/project-profile-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0111_project_profile_outbox.sql:ro
      - ../../services/common-context-service/migrations/0001_common_context.sql:/docker-entrypoint-initdb.d/0120_common_context.sql:ro
      - ../../services/common-context-service/migrations/0002_outbox_published.sql:/docker-entrypoint-initdb.d/0121_common_context_outbox.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  neo4j:
    # Override AGENTCORE_NEO4J_IMAGE to pin a patch (e.g. neo4j:5.26.4-community).
    image: ${AGENTCORE_NEO4J_IMAGE:-neo4j:5.26-community}
    profiles: ["core", "all"]
    environment:
      NEO4J_AUTH: ${AGENTCORE_NEO4J_USER:-neo4j}/${AGENTCORE_NEO4J_PASSWORD:?AGENTCORE_NEO4J_PASSWORD is required}
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
      # Official image auto-installs plugins on first boot.
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    ports:
      - "${AGENTCORE_NEO4J_BOLT_PORT:-32287}:7687"
      - "${AGENTCORE_NEO4J_HTTP_PORT:-32474}:7474"
    volumes:
      - agentcore-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  outbox-relay:
    image: python:3.12-slim
    profiles: ["all"]
    working_dir: /opt/AgentCore
    environment:
      AGENTCORE_DATABASE_URL: postgresql://${AGENTCORE_POSTGRES_USER:-agentcore}:${AGENTCORE_POSTGRES_PASSWORD:?AGENTCORE_POSTGRES_PASSWORD is required}@postgres:5432/${AGENTCORE_POSTGRES_DATABASE:-agentcore}
      PYTHONPATH: backend/packages:backend/apps/worker/src:backend/services/memory-service/src:backend/services/audit-service/src:backend/services/adapter-service/src
    volumes:
      - ../../../:/opt/AgentCore:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "bash",
        "-lc",
        "pip install -q 'psycopg[binary]==3.3.4' && python -m agentcore_worker",
      ]
    restart: unless-stopped

  # Application container: MCP Streamable HTTP gateway (deps from /opt/agentcore-wheelhouse).
  mcp-gateway:
    profiles: ["app", "all"]
    build:
      context: ../../..
      dockerfile: backend/deployments/docker/Dockerfile.mcp-gateway
      additional_contexts:
        wheelhouse: ${AGENTCORE_WHEELHOUSE:-/opt/agentcore-wheelhouse}
    image: agentcore-mcp-gateway:local
    environment:
      AGENTCORE_POSTGRES_HOST: postgres
      AGENTCORE_POSTGRES_PORT: "5432"
      AGENTCORE_POSTGRES_USER: ${AGENTCORE_POSTGRES_USER:-agentcore}
      AGENTCORE_POSTGRES_PASSWORD: ${AGENTCORE_POSTGRES_PASSWORD:?AGENTCORE_POSTGRES_PASSWORD is required}
      AGENTCORE_POSTGRES_DATABASE: ${AGENTCORE_POSTGRES_DATABASE:-agentcore}
      AGENTCORE_NEO4J_HOST: neo4j
      AGENTCORE_NEO4J_BOLT_PORT: "7687"
      AGENTCORE_NEO4J_USER: ${AGENTCORE_NEO4J_USER:-neo4j}
      AGENTCORE_NEO4J_PASSWORD: ${AGENTCORE_NEO4J_PASSWORD:?AGENTCORE_NEO4J_PASSWORD is required}
      AGENTCORE_MCP_HTTP_HOST: "0.0.0.0"
      AGENTCORE_MCP_HTTP_PORT: "32500"
      AGENTCORE_MCP_HTTP_TOKEN: ${AGENTCORE_MCP_HTTP_TOKEN:-agentcore-docker-dev-token}
      AGENTCORE_MCP_STORE_MODE: postgres
      AGENTCORE_CODE_GRAPH_STORE: neo4j
      AGENTCORE_MCP_GRAPH_MODE: neo4j
    ports:
      - "${AGENTCORE_MCP_HTTP_PORT:-32500}:32500"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:32500/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

volumes:
  agentcore-postgres-data:
  agentcore-neo4j-data:
